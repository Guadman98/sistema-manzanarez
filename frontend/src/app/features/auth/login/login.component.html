<div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
  <!-- Glowing Background Orbs -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-eco-600/10 rounded-full blur-3xl -z-10 animate-pulse"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-emerald-600/10 rounded-full blur-3xl -z-10 animate-pulse" style="animation-delay: 2s;"></div>

  <div class="w-full max-w-md glass-panel rounded-3xl p-8 shadow-2xl relative border border-white/10">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center p-3 bg-eco-500/10 rounded-2xl border border-eco-500/20 mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-10 h-10 text-eco-400">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12.75 3.03v.568c0 .334.148.65.405.864l4.03 3.359a.75.75 0 0 1 0 1.154l-4.03 3.358a.879.879 0 0 0-.405.864v.568A7.5 7.5 0 0 1 5.25 12V6.75m11.25 0h.008v.008h-.008V6.75Zm.008 3h-.008V9.75h.008V9.75ZM6 6.75h.008v.008H6V6.75Zm.008 3H6V9.75h.008V9.75ZM6 12.75h.008v.008H6v-.008Zm.008 3H6v-.008h.008v.008ZM6 18.75h.008v.008H6v-.008Zm.008 0H6v-.008h.008v.008Z" />
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tight text-white font-sans">
        Liceo Ecológico
      </h1>
      <p class="text-eco-400 font-medium text-sm mt-1 uppercase tracking-wider">
        Manzanarez
      </p>
    </div>

    <!-- Error Alert -->
    @if (errorMessage) {
      <div class="mb-6 p-4 bg-red-950/40 border border-red-500/30 text-red-200 text-sm rounded-2xl flex items-start gap-3 backdrop-blur-md">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-red-400 shrink-0 mt-0.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
        </svg>
        <span>{{ errorMessage }}</span>
      </div>
    }

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Documento -->
      <div>
        <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">
          Documento de Identidad
        </label>
        <div class="relative">
          <input
            type="text"
            formControlName="documento_identidad"
            placeholder="Ingresa tu documento"
            class="w-full bg-slate-900/60 border border-slate-700/50 rounded-2xl px-4 py-3.5 pl-11 text-white placeholder-slate-500 focus:outline-none focus:border-eco-500 focus:ring-1 focus:ring-eco-500/50 transition-all duration-300"
          />
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-slate-500 absolute left-4 top-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
          </svg>
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">
          Contraseña
        </label>
        <div class="relative">
          <input
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="w-full bg-slate-900/60 border border-slate-700/50 rounded-2xl px-4 py-3.5 pl-11 text-white placeholder-slate-500 focus:outline-none focus:border-eco-500 focus:ring-1 focus:ring-eco-500/50 transition-all duration-300"
          />
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-slate-500 absolute left-4 top-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
          </svg>
        </div>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="loginForm.invalid || isLoading"
        class="w-full bg-gradient-to-r from-eco-600 to-eco-500 hover:from-eco-500 hover:to-eco-400 text-white font-semibold py-3.5 px-6 rounded-2xl shadow-lg hover:shadow-eco-500/20 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300 transform active:scale-95 flex items-center justify-center gap-2 mt-4"
      >
        @if (isLoading) {
          <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Autenticando...
        } @else {
          Ingresar al Portal
        }
      </button>
    </form>

    <!-- Public verification link -->
    <div class="mt-8 text-center border-t border-white/5 pt-6">
      <a href="/verify-certificate" class="text-eco-400 hover:text-eco-300 text-sm font-medium transition-colors duration-200">
        ¿Deseas verificar un certificado escolar? →
      </a>
    </div>
  </div>
</div>
