<div class="min-h-screen flex flex-col md:flex-row">
  <!-- Sidebar -->
  <aside class="w-full md:w-64 glass-panel border-r border-white/5 md:min-h-screen flex flex-col justify-between shrink-0">
    <div>
      <!-- Brand Logo Header -->
      <div class="p-6 border-b border-white/5 flex items-center gap-3">
        <div class="p-2 bg-eco-500/10 rounded-xl border border-eco-500/20 text-eco-400">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12.75 3.03v.568c0 .334.148.65.405.864l4.03 3.359a.75.75 0 0 1 0 1.154l-4.03 3.358a.879.879 0 0 0-.405.864v.568A7.5 7.5 0 0 1 5.25 12V6.75m11.25 0h.008v.008h-.008V6.75Zm.008 3h-.008V9.75h.008V9.75ZM6 6.75h.008v.008H6V6.75Zm.008 3H6V9.75h.008V9.75Z" />
          </svg>
        </div>
        <div>
          <h2 class="font-bold text-white text-base tracking-wide">Liceo Ecológico</h2>
          <span class="text-xs text-eco-400 font-bold uppercase tracking-widest block leading-none mt-0.5">Manzanarez</span>
        </div>
      </div>

      <!-- Navigation Links -->
      <nav class="p-4 space-y-2">
        <a
          routerLink="/teacher/classes"
          routerLinkActive="bg-eco-500/15 text-eco-300 border-l-4 border-eco-500"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white font-medium transition-all duration-200 border-l-4 border-transparent"
        >
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.57 50.57 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.902 59.902 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 7.74-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm0 0v-3.675A55.378 55.378 0 0 1 12 8.443m-7.007 11.55A5.981 5.981 0 0 0 6.75 15.75v-1.5" />
          </svg>
          Mis Clases
        </a>

        <a
          routerLink="/teacher/discipline"
          routerLinkActive="bg-eco-500/15 text-eco-300 border-l-4 border-eco-500"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white font-medium transition-all duration-200 border-l-4 border-transparent"
        >
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m0-10.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.75c0 5.592 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.57-.598-3.75h-.152c-3.196 0-6.1-1.249-8.25-3.286Zm0 13.036h.008v.008H12v-.008Z" />
          </svg>
          Reportar Falta
        </a>
      </nav>
    </div>

    <!-- Teacher Profile Section / Logout -->
    <div class="p-4 border-t border-white/5 bg-slate-900/10">
      <div class="flex items-center gap-3 mb-4 px-2">
        <div class="w-10 h-10 rounded-full bg-emerald-600/20 text-emerald-400 font-bold border border-emerald-500/30 flex items-center justify-center uppercase shadow-inner animate-pulse">
          {{ authService.currentUser()?.nombre ? authService.currentUser()?.nombre.charAt(0) : 'D' }}
        </div>
        <div class="overflow-hidden">
          <p class="text-sm font-bold text-white leading-tight truncate">{{ authService.currentUser()?.nombre || 'Docente' }}</p>
          <span class="text-xs text-eco-400 font-semibold uppercase tracking-wider block">Profesor Escolar</span>
        </div>
      </div>

      <button
        type="button"
        (click)="logout()"
        class="w-full bg-slate-950/40 hover:bg-red-500/10 border border-slate-700/50 hover:border-red-500/30 text-slate-300 hover:text-red-300 font-semibold py-2.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-all duration-200"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
        </svg>
        Cerrar Sesión
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="p-6 border-b border-white/5 flex items-center justify-between glass-panel shrink-0">
      <div class="flex items-center gap-2 text-slate-400 text-sm font-medium">
        <span>Portal de Gestión</span>
        <span>/</span>
        <span class="text-white capitalize">Docente</span>
      </div>
      <div class="text-xs text-slate-400 font-mono">
        Colegio: <span class="text-eco-400 font-bold">Liceo Ecológico Manzanarez</span>
      </div>
    </header>

    <!-- Subpage Content -->
    <div class="flex-1 p-6 lg:p-8 relative overflow-y-auto">
      <div class="absolute top-10 right-10 w-80 h-80 bg-eco-600/5 rounded-full blur-3xl -z-10 pointer-events-none"></div>

      <router-outlet></router-outlet>
    </div>
  </main>
</div>
